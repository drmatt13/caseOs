x-common-env: &common-env
  CHOKIDAR_USEPOLLING: "true"
  CHOKIDAR_INTERVAL: "300"
  AWS_PROFILE: dev
  AWS_REGION: us-east-1
  AWS_SDK_LOAD_CONFIG: "1"

services:
  local-api-dev-server:
    build:
      context: ./local-api-dev-server
      dockerfile: dockerfile
    environment:
      <<: *common-env
      NODE_ENV: development
      PORT: "8080"
      LANGGRAPH_SERVICE_URL: "http://langgraph-service"
      DATABASE_POOLING_URL: "postgresql://app_user:app_password@pgbouncer:5432/app_db"
      DATABASE_DIRECT_URL: "postgresql://app_user:app_password@postgres:5432/app_db"
    ports:
      - "8080:8080"
    volumes:
      - ./local-api-dev-server:/app
      - ./cdk-app:/cdk-app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      langgraph-service:
        condition: service_started

  langgraph-service:
    build:
      context: ./cdk-app/ecs_containers/langgraph-service
      dockerfile: dockerfile
    environment:
      <<: *common-env
      PORT: "80"
    volumes:
      - ./cdk-app/ecs_containers/langgraph-service:/app
      - /app/node_modules
      - type: bind
        source: ${USERPROFILE}/.aws
        target: /root/.aws
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: local-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: app_db
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
      ADMIN_USERS: app_user
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: local-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: