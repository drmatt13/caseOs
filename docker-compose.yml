x-common-env: &common-env
  CHOKIDAR_USEPOLLING: "true"
  CHOKIDAR_INTERVAL: "300"
  AWS_PROFILE: dev
  AWS_REGION: us-east-1
  AWS_SDK_LOAD_CONFIG: "1"

services:
  root-deps:
    image: node:alpine
    profiles: ["tools"]
    working_dir: /workspace
    command: ["npm", "install"]
    volumes:
      - ./:/workspace

  local-dev-server:
    build:
      context: ./local-dev-server
      dockerfile: dockerfile
    environment:
      <<: *common-env
      NODE_ENV: development
      PORT: "8080"
      LANGGRAPH_SERVICE_URL: "http://langgraph-service"
      PRIMARY_DATABASE_URL: "postgresql://app_user:app_password@postgres:5432/app_db"
      USE_LOCAL_IMPLEMENTATIONS: "false" # Never capture event-driven functions in local dev
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace # Bind mount, map entire monorepo to /workspace in the container
      - workspace_node_modules:/workspace/node_modules # Linux-native deps, isolated from host
      - type: bind
        source: ${USERPROFILE}/.aws
        target: /root/.aws
    depends_on:
      postgres:
        condition: service_healthy
      langgraph-service:
        condition: service_started

  langgraph-service:
    build:
      context: ./cdk-app/ecs_containers/langgraph-service
      dockerfile: dockerfile
    environment:
      <<: *common-env
      PORT: "80"
    volumes:
      - ./cdk-app/ecs_containers/langgraph-service:/app
      - /app/node_modules
      - type: bind
        source: ${USERPROFILE}/.aws
        target: /root/.aws
    depends_on:
      postgres:
        condition: service_healthy

  postgres: # postgresql://app_user:app_password@postgres:5432/app_db
    image: postgres:16
    container_name: local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: local-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      GUNICORN_ACCESS_LOGFILE: /dev/null
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  workspace_node_modules: